name: docker image

on:
  push:
    branches: [ master, gis-based-mode-detection, '**__image_build_**' ]

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      date: ${{ steps.date.outputs.date }}

    steps:
    - uses: actions/checkout@v2

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: docker login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Get current date # get the date of the build
      id: date
      run: echo "::set-output name=date::$(date +'%Y-%m-%d--%M-%S')"

    #Runs a single command using the runners shell
    - name: Run a one-line script to validate actions
      run: echo running in repo ${{ github.event.repository.name }} branch ${{ github.ref_name }} on ${{ steps.date.outputs.date }}

    - name: build and push docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64/v8
        push: true
        tags: ${{ secrets.DOCKER_USER }}/${{ github.event.repository.name }}:${{ github.ref_name }}_${{ steps.date.outputs.date }}

    - name: Create a text file
      run: |
        echo ${{ steps.date.outputs.date }} > tag_file.txt
        echo "Created tag text file"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image-tag
        path: tag_file.txt
        overwrite: true

  dispatch:
    needs: build
    runs-on: ubuntu-latest

    env:
      DOCKER_IMAGE_TAG: ${{ needs.build.outputs.date }}

    strategy:
      matrix:
        include:
          - repo: e-mission/op-admin-dashboard
            branch: master
          - repo: e-mission/em-public-dashboard
            branch: main

    steps:
    - uses: actions/checkout@v4

    - name: Trigger workflow in admin-dash, public-dash
      # TODO: Create Fine-grained token with "Actions: write" permissions 
      run: |
        curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GH_FG_PAT_TAGS }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/${{ matrix.repo }}/actions/workflows/image_build_push.yml/dispatches \
          -d '{"ref":"${{ matrix.branch }}", "inputs": {"docker_image_tag" : "${{ env.DOCKER_IMAGE_TAG }}"}}'
